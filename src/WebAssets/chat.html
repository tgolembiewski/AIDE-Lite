<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIDE Lite</title>
    <link rel="stylesheet" href="styles.css?v=4">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <span class="title">AIDE Lite</span>
                <span class="version-badge">v1.1.0</span>
                <span class="model-badge" id="modelBadge">Sonnet 4.5</span>
                <span class="token-badge hidden" id="tokenBadge"></span>
            </div>
            <div class="header-actions">
                <button id="themeToggleBtn" class="icon-btn" title="Toggle Dark Mode">&#x1F319;</button>
                <button id="refreshBtn" class="icon-btn" title="Refresh App Context">&#x21bb;</button>
                <button id="newChatBtn" class="icon-btn" title="New Chat">&#x2795;</button>
                <button id="settingsBtn" class="icon-btn" title="Settings">&#x2699;</button>
            </div>
        </div>

        <!-- Context Status Bar -->
        <div id="contextBar" class="context-bar">
            <span id="contextDot" class="status-dot offline"></span>
            <span id="contextText">No context loaded - click &#x21bb; to refresh</span>
        </div>

        <!-- Chat Messages Area -->
        <div id="chatArea" class="chat-area">
            <div class="welcome" id="welcomeScreen">
                <h2>AIDE Lite</h2>
                <p>AI-powered Mendix development assistant</p>
                <div class="quick-actions">
                    <button class="quick-action" data-prompt="Describe the domain model of this app">
                        Describe Domain Model
                    </button>
                    <button class="quick-action" data-prompt="What microflows exist and what do they do?">
                        List Microflows
                    </button>
                    <button class="quick-action" data-prompt="Suggest improvements to the data model">
                        Suggest Improvements
                    </button>
                </div>
            </div>
        </div>

        <!-- Processing Progress Bar -->
        <div id="processingBar" class="processing-bar hidden">
            <div class="processing-bar-track">
                <div class="processing-bar-fill"></div>
            </div>
            <span id="processingLabel" class="processing-label">Thinking...</span>
        </div>

        <!-- Tool Activity Indicator -->
        <div id="toolActivity" class="tool-activity hidden">
            <div class="tool-spinner"></div>
            <span id="toolLabel">Working...</span>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <textarea id="chatInput" placeholder="Ask about your app, or request a microflow..." rows="2"></textarea>
            <button id="sendBtn" class="send-btn" title="Send">&#x27A4;</button>
            <button id="stopBtn" class="stop-btn hidden" title="Stop generating">&#x25A0;</button>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-dialog">
            <h3>AIDE Lite Settings</h3>
            <div class="form-group">
                <label for="apiKeyInput">Claude API Key</label>
                <input type="password" id="apiKeyInput" placeholder="sk-ant-api03-...">
                <small>Stored locally with encryption. Never shared.</small>
            </div>
            <div class="form-group">
                <label for="modelSelect">Model</label>
                <select id="modelSelect">
                    <option value="claude-sonnet-4-5-20250929">Claude Sonnet 4.5 (Recommended)</option>
                    <option value="claude-opus-4-6">Claude Opus 4.6 (Most Intelligent)</option>
                    <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5 (Fastest)</option>
                </select>
            </div>
            <div class="form-group">
                <label for="contextDepthSelect">Context Depth</label>
                <select id="contextDepthSelect">
                    <option value="full">Full App (all modules)</option>
                    <option value="module">Current Module Only</option>
                </select>
            </div>
            <div class="form-group">
                <label for="maxTokensInput">Max Response Tokens</label>
                <input type="number" id="maxTokensInput" value="8192" min="256" max="128000">
            </div>
            <div class="form-group">
                <label for="themeSelect">Theme</label>
                <select id="themeSelect">
                    <option value="light">Light</option>
                    <option value="dark">Dark</option>
                </select>
            </div>
            <div class="modal-actions">
                <button id="saveSettingsBtn" class="primary-btn">Save</button>
                <button id="cancelSettingsBtn" class="secondary-btn">Cancel</button>
            </div>
        </div>
    </div>

    <script src="app.js?v=4"></script>
</body>
</html>
